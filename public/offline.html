<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HomeLink Offline</title>
    <style>
      body {
        margin: 0;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #f5f7fb;
        color: #071427;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100% - 32px));
        border: 1px solid #d9e2ee;
        border-radius: 8px;
        padding: 28px;
        background: #ffffff;
        box-shadow: 0 22px 70px rgba(8, 20, 39, 0.12);
      }

      h1 {
        margin: 0 0 10px;
      }

      p {
        color: #667085;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HomeLink is offline</h1>
      <p>Your app shell is available. Reconnect to continue requests, KYC, messages, and admin updates.</p>
    </main>
  </body>
</html>
